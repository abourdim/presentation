<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Workshop-Diy</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#F4F0E8;overflow:hidden;font-family:'Rajdhani',sans-serif;color:#2a1a08}
#c{position:fixed;inset:0;z-index:0}
#hud{position:fixed;inset:0;z-index:10;pointer-events:none}
#title{position:absolute;top:38%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;opacity:0;animation:ap 1.5s 0.6s ease forwards}
#title h1{font-family:'Orbitron',monospace;font-size:clamp(28px,3.8vw,58px);font-weight:900;letter-spacing:0.1em;background:linear-gradient(135deg,#B84400 0%,#D45000 50%,#B84400 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:glow 4s ease-in-out infinite}
@keyframes glow{0%,100%{filter:drop-shadow(0 0 10px rgba(180,80,0,.25))}50%{filter:drop-shadow(0 0 24px rgba(180,80,0,.5))}}
#title .bar{width:0;height:2px;margin:12px auto;background:linear-gradient(90deg,transparent,#B84400,#D46000,#B84400,transparent);animation:expand 1.5s 1.5s ease forwards;box-shadow:0 0 6px rgba(180,80,0,.3)}
@keyframes expand{to{width:320px}}
#title .sub{font-size:clamp(13px,1.6vw,20px);font-weight:400;letter-spacing:0.1em;color:rgba(60,35,10,.52);margin-top:10px}
#spot{
  position:absolute;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);
  background:rgba(255,252,245,.97);border:1px solid rgba(180,80,0,.3);
  border-radius:20px;padding:28px 40px 24px;max-width:680px;width:92%;
  opacity:0;transition:all .6s cubic-bezier(.16,1,.3,1);
  box-shadow:0 8px 60px rgba(160,70,0,.14),0 0 0 1px rgba(180,80,0,.07);
  backdrop-filter:blur(24px);
}
#spot.show{opacity:1;transform:translateX(-50%) translateY(0)}
#spot-inner{display:flex;align-items:flex-start;gap:24px;text-align:left}
#se{font-size:64px;flex-shrink:0;line-height:1;margin-top:2px;filter:drop-shadow(0 3px 12px rgba(180,80,0,.25))}
#spot-body{flex:1;min-width:0}
#sn{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;color:#B84400;letter-spacing:.05em;line-height:1.1;margin-bottom:12px}
#sd{font-size:17px;color:rgba(40,22,6,.75);line-height:1.75;font-weight:400;margin-bottom:14px}
#sc{display:flex;gap:7px;flex-wrap:wrap}
.ct{padding:4px 12px;border:1px solid rgba(180,80,0,.3);border-radius:20px;font-size:11px;letter-spacing:.1em;color:rgba(150,60,0,.85);text-transform:uppercase;font-weight:600;background:rgba(180,80,0,.06)}
#ctr{position:absolute;top:22px;left:26px;font-family:'Orbitron',monospace;font-size:10px;letter-spacing:.2em;color:rgba(150,70,0,.55);opacity:0;animation:ap 1s 2s ease forwards}
#ctr b{color:#B84400;font-size:14px}
#ln{position:absolute;top:16px;right:22px;display:flex;gap:8px;pointer-events:all;opacity:0;animation:ap 1s 2s ease forwards}
.lb{background:rgba(255,255,255,.75);border:1px solid rgba(180,80,0,.22);color:rgba(150,65,0,.6);font-family:'Orbitron',monospace;font-size:10px;letter-spacing:.1em;padding:5px 11px;border-radius:4px;cursor:pointer;transition:all .2s}
.lb.on,.lb:hover{background:rgba(180,80,0,.1);border-color:#B84400;color:#B84400}
#ft{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);font-size:10px;letter-spacing:.18em;color:rgba(80,40,0,.3);text-transform:uppercase;opacity:0;animation:ap 1s 3s ease forwards;white-space:nowrap}
#ft a{color:rgba(160,70,0,.4);text-decoration:none}
@keyframes ap{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
#sp-bar{position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,#B84400,#D46000,#B84400,transparent);animation:scanbar 4.5s linear infinite;opacity:.45}
@keyframes scanbar{0%{transform:scaleX(0);transform-origin:left}50%{transform:scaleX(1)}100%{transform:scaleX(0);transform-origin:right}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div id="ctr"><b>93</b> APPS · CHELLES, FRANCE</div>
  <div id="ln">
    <button class="lb on" onclick="setLang('fr')">FR</button>
    <button class="lb" onclick="setLang('en')">EN</button>
    <button class="lb" onclick="setLang('ar')">عر</button>
  </div>
  <div id="title">
    <h1>WORKSHOP-DIY</h1>
    <div class="bar"></div>
    <div class="sub" id="sub">On construit, on apprend, on partage</div>
  </div>
  <div id="spot">
    <div id="sp-bar"></div>
    <div id="spot-inner">
      <span id="se"></span>
      <div id="spot-body">
        <div id="sn"></div>
        <div id="sd"></div>
        <div id="sc"></div>
      </div>
    </div>
  </div>
  <div id="ft">powered by <a href="https://workshop-diy.org" target="_blank">workshop-diy.org</a></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const I18N={fr:{sub:'On construit, on apprend, on partage'},en:{sub:'Build. Learn. Share.'},ar:{sub:'نبني ، نتعلم ، نشارك'}};
let LANG='fr';
function setLang(l){
  LANG=l;
  document.querySelectorAll('.lb').forEach(b=>b.classList.toggle('on',b.textContent.trim()===l.toUpperCase()||(l==='ar'&&b.textContent.includes('ع'))));
  document.getElementById('sub').textContent=I18N[l].sub;
  document.documentElement.lang=l; document.documentElement.dir=l==='ar'?'rtl':'ltr';
  if(curIdx>=0&&DATA[curIdx])document.getElementById('sd').textContent=DATA[curIdx].app.desc[l]||DATA[curIdx].app.desc.fr;
}
const BASE='https://abourdim.github.io/apps/thumbs/';
const APPS=[
  {name:'bit-bot',emoji:'🤖',thumb:'bit-bot.png',cats:['microbit','ai'],desc:{fr:'Compagnon robot parlant alimenté par IA — dialoguez par la voix, choisissez sa personnalité et connectez-le à un micro:bit via Bluetooth.',en:'AI talking robot — voice, micro:bit BLE',ar:'روبوت ذكاء اصطناعي ناطق'}},
  {name:'face-quest',emoji:'🕵️',thumb:'face-quest.png',cats:['camera','ai'],desc:{fr:'Jeu de détection faciale dans le navigateur — souriez, clignez, tournez la tête pour marquer des points. 100% local, aucune donnée envoyée.',en:'Face detection game — smile, blink!',ar:'لعبة كشف الوجه'}},
  {name:'magic-hands',emoji:'🪄',thumb:'magic-hands.png',cats:['camera','ai'],desc:{fr:'Agitez vos mains devant la caméra pour déclencher des effets magiques — confettis, traînées lumineuses, lueur néon — propulsé par MediaPipe.',en:'Wave hands — magic effects!',ar:'تأثيرات سحرية بتتبع اليد'}},
  {name:'teachable-machine',emoji:'🧠',thumb:'teachable-machine.png',cats:['ai','microbit'],desc:{fr:'Entraînez vos propres modèles IA pour reconnaître gestes et sons, puis envoyez les résultats en temps réel vers un micro:bit via Bluetooth.',en:'Train AI gestures → micro:bit real time',ar:'تدريب إيماءات الذكاء الاصطناعي'}},
  {name:'bit-playground',emoji:'🕹️',thumb:'bit-playground.png',cats:['microbit'],desc:{fr:'Le terrain de jeu ultime pour micro:bit BLE — LEDs, capteurs, servos, jeux et graphiques depuis le navigateur.',en:'Ultimate micro:bit BLE playground',ar:'ملعب micro:bit BLE المطلق'}},
  {name:'mission-control',emoji:'🛸',thumb:'mission-control.png',cats:['microbit','classroom'],desc:{fr:'Tableau de bord avec vidéo et chat WebRTC — envoyez des commandes à distance vers un micro:bit via Bluetooth.',en:'WebRTC dashboard + micro:bit commands',ar:'لوحة تحكم WebRTC'}},
  {name:'bitmoji-lab',emoji:'🎪',thumb:'bitmoji-lab.png',cats:['microbit'],desc:{fr:'Choisissez des emojis, peignez-les et envoyez vos créations vers une matrice LED NeoPixel 8x8 ou 16x16 via micro:bit.',en:'Emojis to NeoPixel LED matrix',ar:'إيموجي إلى مصفوفة LED'}},
  {name:'ble-logger',emoji:'📶',thumb:'ble-logger.png',cats:['microbit'],desc:{fr:'Journal de débogage Bluetooth pour micro:bit — connectez-vous, inspectez les services, lisez les capteurs et logguez en temps réel.',en:'Bluetooth sensor logger for micro:bit',ar:'مسجل بلوتوث لـ micro:bit'}},
  {name:'face-tracking',emoji:'👁️',thumb:'face-tracking.png',cats:['camera','microbit'],desc:{fr:'Suivi de visage → données BLE micro:bit',en:'Face tracking → BLE micro:bit data',ar:'تتبع الوجه مع micro:bit'}},
  {name:'linux-kids-lab',emoji:'🐧',thumb:'linux-kids-lab.png',cats:['learning'],desc:{fr:'Apprenez Linux dans un bac à sable sécurisé — fichiers, pipes, scripts bash. Devenez un ninja du terminal !',en:'Learn Linux in a safe browser sandbox',ar:'تعلّم لينكس في المتصفح'}},
  {name:'crypto-academy',emoji:'🪙',thumb:'crypto-academy.png',cats:['learning'],desc:{fr:'Cryptographie interactive — chiffrement, hachage, signatures numériques, PKI et TLS avec de vraies opérations Web Crypto API.',en:'Interactive cryptography — TLS, PKI',ar:'تشفير تفاعلي متكامل'}},
  {name:'pentest-lab',emoji:'🔐',thumb:'pentest-lab.png',cats:['learning'],desc:{fr:'Bac à sable cybersécurité pour débutants — apprenez les bases à travers des défis guidés et des exercices CTF interactifs.',en:'Cybersecurity — CTF style',ar:'أمن سيبراني وتحديات CTF'}},
  {name:'circuit-lab',emoji:'🔋',thumb:'circuit-lab.png',cats:['hardware','learning'],desc:{fr:'Construisez et simulez des circuits électroniques — câblez LEDs, résistances et capteurs, visualisez le courant en temps réel.',en:'Simulate electronic circuits',ar:'محاكاة الدوائر الإلكترونية'}},
  {name:'3d-lab',emoji:'🧊',thumb:'3d-lab.png',cats:['learning'],desc:{fr:'Explorez la conception 3D dans le navigateur — créez, faites pivoter et éclairez des objets interactifs avec Three.js.',en:'Explore 3D with Three.js',ar:'استكشف التصميم ثلاثي الأبعاد'}},
  {name:'rxy',emoji:'🎮',thumb:'rxy.png',cats:['microbit'],desc:{fr:'Créez une télécommande Bluetooth personnalisée pour micro:bit — glissez des boutons, curseurs et D-pads. Zéro code requis.',en:'BLE remote for micro:bit — no coding',ar:'جهاز تحكم BLE بدون برمجة'}},
  {name:'arabic-translator',emoji:'🌐',thumb:'arabic-translator.png',cats:['arabic'],desc:{fr:'Traduisez vers et depuis l arabe dans le navigateur — sans serveur, sans clé API, fonctionne entièrement hors ligne.',en:'Arabic translation 100% local',ar:'ترجمة عربية محلية بدون إنترنت'}},
  {name:'piper-arabic-tts',emoji:'🎙️',thumb:'piper-arabic-tts.png',cats:['arabic','ai'],desc:{fr:'Synthèse vocale arabe via WebAssembly',en:'Arabic TTS via WebAssembly',ar:'نص عربي إلى كلام عبر WebAssembly'}},
  {name:'wled-kids-lab',emoji:'💡',thumb:'wled-kids-lab.png',cats:['hardware'],desc:{fr:'Contrôlez des rubans LED WS2812 / NeoPixel avec WLED — choisissez couleurs, effets et luminosité. Introduction ludique aux LEDs adressables.',en:'WS2812 LED strips with WLED',ar:'شرائط LED مع WLED'}},
  {name:'esp32-c3-kids-lab',emoji:'⚡',thumb:'esp32-c3-kids-lab.png',cats:['hardware'],desc:{fr:'Labo pratique ESP32-C3 — allumez des LEDs, lisez des capteurs, connectez-vous au WiFi et créez vos premiers projets IoT.',en:'Hands-on ESP32-C3 — browser IoT',ar:'مختبر ESP32-C3 عملي'}},
  {name:'pixel-gateway',emoji:'🟥',thumb:'pixel-gateway.png',cats:['microbit'],desc:{fr:'Emojis colorés → NeoPixel USB & BLE',en:'Colored emojis → NeoPixel USB & BLE',ar:'إيموجي ملون إلى NeoPixel'}},
  {name:'usb-logger',emoji:'🔌',thumb:'usb-logger.png',cats:['microbit'],desc:{fr:'Communication micro:bit via USB WebSerial',en:'micro:bit USB WebSerial',ar:'تواصل micro:bit عبر USB'}},
  {name:'classroom',emoji:'🏫',thumb:'classroom.png',cats:['classroom'],desc:{fr:'Classe virtuelle PeerJS — 12 élèves',en:'PeerJS virtual classroom',ar:'فصل افتراضي PeerJS'}},
  {name:'puppeteer-playground',emoji:'🎭',thumb:'puppeteer-playground.png',cats:['tools'],desc:{fr:'Automatisation navigateur Puppeteer',en:'Puppeteer browser automation',ar:'أتمتة المتصفح مع Puppeteer'}},
  {name:'save-our-planet',emoji:'🌍',thumb:null,cats:['learning'],desc:{fr:'Robots sauvent la Terre en 2050',en:'Robots saving Earth in 2050',ar:'روبوتات تنقذ الأرض 2050'}},
  {name:'cowsay',emoji:'🐄',thumb:null,cats:['learning'],desc:{fr:'Vache ASCII — maths et faits amusants !',en:'ASCII cow — math and fun facts!',ar:'بقرة ASCII للرياضيات'}},
  {name:'salat-times',emoji:'🕌',thumb:null,cats:['arabic'],desc:{fr:'Horaires de prière + lanterne Adhan micro:bit',en:'Prayer times + micro:bit Adhan Lantern',ar:'مواقيت الصلاة + فانوس الأذان'}},
  {name:'ops-catalog-kids-apps',emoji:'🎠',thumb:null,cats:['learning'],desc:{fr:'190 jeux éducatifs — GCompris & TuxMath',en:'190 educational games — GCompris & TuxMath',ar:'190 لعبة تعليمية تفاعلية'}},
  {name:'ops-catalog-kids-quizzes',emoji:'🧮',thumb:null,cats:['learning'],desc:{fr:'2 215 quiz — maths, sciences, géographie',en:'2,215 quizzes — math, science, geography',ar:'2215 اختبار تعليمي'}},
  {name:'emojis',emoji:'😀',thumb:null,cats:['learning'],desc:{fr:'EmojiFlow — apprendre le code par les emojis',en:'EmojiFlow — learn coding through emojis',ar:'تعلم البرمجة بالرموز'}},
];

const W=()=>window.innerWidth,H=()=>window.innerHeight;
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(W(),H());
renderer.setClearColor(0xF4F0E8,1);
const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0xF0ECE4,0.038);
const camera=new THREE.PerspectiveCamera(55,W()/H(),.1,200);
camera.position.set(0,0,16);
scene.add(new THREE.AmbientLight(0xFFF5E0,.7));
const pt1=new THREE.PointLight(0xFF8C00,4,35);pt1.position.set(0,2,4);scene.add(pt1);
const pt2=new THREE.PointLight(0x8866ff,.8,35);pt2.position.set(0,8,-10);scene.add(pt2);
const pt3=new THREE.PointLight(0xFF6600,1,20);pt3.position.set(-8,-4,2);scene.add(pt3);

const sg=new THREE.BufferGeometry();
const sp=new Float32Array(600*3),sc=new Float32Array(600*3);
for(let i=0;i<600;i++){
  sp[i*3]=(Math.random()-.5)*100;sp[i*3+1]=(Math.random()-.5)*70;sp[i*3+2]=(Math.random()-.5)*80;
  const t=Math.random();sc[i*3]=t>.7?.65:.3;sc[i*3+1]=t>.7?.32:.18;sc[i*3+2]=t>.7?0:.02;
}
sg.setAttribute('position',new THREE.BufferAttribute(sp,3));
sg.setAttribute('color',new THREE.BufferAttribute(sc,3));
scene.add(new THREE.Points(sg,new THREE.PointsMaterial({size:.06,vertexColors:true,transparent:true,opacity:.35})));

function makeCard(app,img){
  const cv=document.createElement('canvas');cv.width=768;cv.height=480;
  const cx=cv.getContext('2d');
  if(img){
    cx.fillStyle='#FDFAF4';cx.fillRect(0,0,768,480);
    cx.save();cx.beginPath();cx.roundRect(0,0,768,288,0);cx.clip();cx.drawImage(img,0,0,768,288);cx.restore();
    const sc=cx.createLinearGradient(0,135,0,288);
    sc.addColorStop(0,'rgba(253,250,244,0)');sc.addColorStop(1,'rgba(253,250,244,0.35)');
    cx.fillStyle=sc;cx.fillRect(0,0,768,288);
    cx.fillStyle='rgba(253,250,244,.97)';cx.fillRect(0,282,768,198);
    cx.strokeStyle='rgba(180,80,0,.3)';cx.lineWidth=2;cx.beginPath();cx.roundRect(1,1,766,478,14);cx.stroke();
    cx.font='42px serif';cx.textAlign='left';cx.fillText(app.emoji,18,336);
    cx.fillStyle='#A83A00';cx.font='bold 28px Orbitron,monospace';
    cx.fillText(app.name.length>17?app.name.substr(0,16)+'…':app.name,74,332);
    cx.fillStyle='rgba(160,70,0,.6)';cx.font='19px Rajdhani,sans-serif';
    cx.fillText(app.cats[0].toUpperCase(),74,360);
    cx.fillStyle='rgba(35,18,5,.8)';cx.font='400 20px Rajdhani,sans-serif';
    const ws=app.desc.fr.split(' ');let l='',y=400;
    for(const w of ws){const t=l+w+' ';if(cx.measureText(t).width>718&&l){cx.fillText(l,18,y);l=w+' ';y+=24;if(y>470)break;}else l=t;}
    if(y<=470)cx.fillText(l,18,y);
  } else {
    const g=cx.createLinearGradient(0,0,768,480);g.addColorStop(0,'#FDFAF2');g.addColorStop(1,'#F5F0E6');
    cx.fillStyle=g;cx.fillRect(0,0,768,480);
    cx.strokeStyle='rgba(180,80,0,.2)';cx.lineWidth=2;cx.beginPath();cx.roundRect(1,1,766,478,14);cx.stroke();
    cx.font='110px serif';cx.textAlign='center';cx.fillText(app.emoji,384,190);
    cx.fillStyle='#A83A00';cx.font='bold 34px Orbitron,monospace';cx.textAlign='center';
    cx.fillText(app.name.length>14?app.name.substr(0,13)+'…':app.name,384,270);
    cx.fillStyle='rgba(160,70,0,.55)';cx.font='21px Rajdhani,sans-serif';
    cx.fillText(app.cats.slice(0,2).join(' · ').toUpperCase(),384,308);
    cx.fillStyle='rgba(35,18,5,.72)';cx.font='400 22px Rajdhani,sans-serif';
    const ws=app.desc.fr.split(' ');let l='',y=360;
    for(const w of ws){const t=l+w+' ';if(cx.measureText(t).width>680&&l){cx.fillText(l,384,y);l=w+' ';y+=28;if(y>465)break;}else l=t;}
    if(y<=465)cx.fillText(l,384,y);
  }
  const lg=cx.createLinearGradient(0,474,768,474);
  lg.addColorStop(0,'transparent');lg.addColorStop(.35,'#B84400');
  lg.addColorStop(.5,'#D46000');lg.addColorStop(.65,'#B84400');lg.addColorStop(1,'transparent');
  cx.fillStyle=lg;cx.fillRect(0,473,768,7);
  return cv;
}

const RINGS=[{y:3.2,r:12,speed:.004,a0:0},{y:-.6,r:14,speed:-.0028,a0:Math.PI/6},{y:-4.5,r:12,speed:.0035,a0:Math.PI/3}];
const DATA=[];
[[0,10],[10,20],[20,APPS.length]].forEach(([a,b],ri)=>{
  const apps=APPS.slice(a,b),ring=RINGS[ri],n=apps.length;
  apps.forEach((app,i)=>{
    const angle=ring.a0+(i/n)*Math.PI*2;
    const tex=new THREE.CanvasTexture(makeCard(app,null));
    const mat=new THREE.MeshStandardMaterial({map:tex,transparent:true,opacity:.92,emissiveMap:tex,emissive:new THREE.Color(.02,.007,0),roughness:.85,metalness:.05});
    const mesh=new THREE.Mesh(new THREE.PlaneGeometry(5.2,3.3),mat);
    mesh.position.set(Math.sin(angle)*ring.r,ring.y,Math.cos(angle)*ring.r);
    mesh.lookAt(0,ring.y,0);
    scene.add(mesh);
    DATA.push({app,mesh,ring:ri,angle,mat});
    if(app.thumb){
      const img=new Image();img.crossOrigin='anonymous';
      img.onload=()=>{const t2=new THREE.CanvasTexture(makeCard(app,img));mat.map=t2;mat.emissiveMap=t2;mat.needsUpdate=true;};
      img.src=BASE+app.thumb;
    }
  });
});

let curIdx=-1;
const spotEl=document.getElementById('spot');
function showSpot(idx){
  curIdx=idx;const d=DATA[idx];if(!d)return;
  document.getElementById('se').textContent=d.app.emoji;
  document.getElementById('sn').textContent=d.app.name;
  document.getElementById('sd').textContent=d.app.desc[LANG]||d.app.desc.fr;
  document.getElementById('sc').innerHTML=d.app.cats.map(c=>`<span class="ct">${c}</span>`).join('');
  spotEl.classList.add('show');
  DATA.forEach((e,i)=>{
    const active = i===idx;
    e.mat.opacity = active ? 1 : .72;
    e.mat.emissive = new THREE.Color(active?.06:.005, active?.02:.002, 0);
    // Scale up active card smoothly
    const targetS = active ? 1.18 : 1.0;
    e.mesh.scale.lerp(new THREE.Vector3(targetS,targetS,targetS), 0.08);
  });
}
setTimeout(()=>{showSpot(0);setInterval(()=>{curIdx=(curIdx+1)%DATA.length;showSpot(curIdx);},4500);},3200);

const clock=new THREE.Clock();let t=0;
(function loop(){
  requestAnimationFrame(loop);const dt=clock.getDelta();t+=dt;
  RINGS.forEach((ring,ri)=>{
    DATA.filter(d=>d.ring===ri).forEach(d=>{
      d.angle+=ring.speed*dt*60;
      d.mesh.position.x=Math.sin(d.angle)*ring.r;d.mesh.position.z=Math.cos(d.angle)*ring.r;
      d.mesh.lookAt(0,ring.y,0);
    });
  });
  // Animate all cards: gentle float + active card grows
  DATA.forEach((d,i)=>{
    const active = i===curIdx;
    const targetS = active ? 1.18 : 1.0;
    d.mesh.scale.x += (targetS - d.mesh.scale.x) * 0.06;
    d.mesh.scale.y += (targetS - d.mesh.scale.y) * 0.06;
    // gentle Y float for non-active
    if(!active) d.mesh.position.y = RINGS[d.ring].y + Math.sin(t*0.8 + i*0.4)*0.08;
  });
  pt1.intensity=3.5+Math.sin(t*1.4)*1;pt1.position.x=Math.sin(t*.25)*5;pt1.position.y=2+Math.cos(t*.18)*2;
  camera.position.y=Math.sin(t*.15)*.6;camera.position.x=Math.cos(t*.1)*.4;camera.lookAt(0,-1,0);
  renderer.render(scene,camera);
})();
window.addEventListener('resize',()=>{renderer.setSize(W(),H());camera.aspect=W()/H();camera.updateProjectionMatrix();});
